version: "2"
linters:
  default: none
  enable:
    - asasalint
    - bidichk
    - bodyclose
    - durationcheck
    - errcheck
    - errchkjson
    - errorlint
    - forcetypeassert
    - gocheckcompilerdirectives
    - goconst
    - gocritic
    - govet
    - ineffassign
    - loggercheck
    - mirror
    - misspell
    - nilerr
    - nilnil
    - noctx
    - paralleltest
    - prealloc
    - predeclared
    - reassign
    - revive
    - rowserrcheck
    - sqlclosecheck
    - staticcheck
    - thelper
    - unconvert
    - unparam
    - unused
    - usestdlibvars
  settings:
    errcheck:
      exclude-functions:
        - (go.uber.org/zap/zapcore.ObjectEncoder).AddObject
    goconst:
      # Test fixtures inline strings like "default", "true", port specs
      # repeatedly for readability — extracting them to constants would
      # obscure each test case's intent.
      ignore-tests: true
    misspell:
      locale: US
    paralleltest:
      ignore-missing: true
    revive:
      rules:
        - name: blank-imports
          disabled: true
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
formatters:
  enable:
    - gci
    - gofumpt
  settings:
    gci:
      sections:
        - standard
        - default
        - prefix(github.com/capnspacehook/whalewall)
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
